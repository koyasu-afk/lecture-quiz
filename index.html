<body>
<div id="app">
<section id="setup-screen" class="screen active">
<h1>講義理解度チェッカー</h1>
<p class="subtitle">講義の内容を理解できているかテストしよう</p>
<div class="total-badge"><span id="total-count">全0問</span><span class="total-breakdown" id="total-breakdown"></span></div>
<div class="card"><h2>0. あなたの名前</h2>
<input type="text" id="user-name" class="name-input" placeholder="名前を入力してください">
</div>
<div class="card"><h2>1. 講義を選択</h2>
<div class="lecture-controls"><button onclick="selectAll()" class="btn-sm">全選択</button><button onclick="deselectAll()" class="btn-sm">全解除</button></div>
<div id="lecture-list" class="lecture-list"></div></div>
<div class="card"><h2>2. 難易度を選択</h2>
<div class="difficulty-options">
<label class="difficulty-option"><input type="radio" name="difficulty" value="basic" checked><span class="difficulty-label"><strong>基礎</strong><small>用語・定義の理解</small></span></label>
<label class="difficulty-option"><input type="radio" name="difficulty" value="applied"><span class="difficulty-label"><strong>応用</strong><small>仕組み・関係性の理解</small></span></label>
<label class="difficulty-option"><input type="radio" name="difficulty" value="practical"><span class="difficulty-label"><strong>実践</strong><small>判断力・状況対応</small></span></label>
</div></div>
<div class="card"><h2>3. 出題数</h2>
<div class="num-options">
<label><input type="radio" name="num" value="5"> 5問</label>
<label><input type="radio" name="num" value="10" checked> 10問</label>
<label><input type="radio" name="num" value="20"> 20問</label>
</div></div>
<button class="btn-primary" onclick="startQuiz()">テスト開始</button>
</section>
<section id="quiz-screen" class="screen">
<div class="quiz-header"><span id="quiz-progress">1/10</span><span id="quiz-score">正解: 0</span></div>
<div class="card quiz-card">
<p class="quiz-difficulty" id="quiz-difficulty-label"></p>
<h2 id="quiz-question"></h2>
<div id="quiz-choices" class="choices"></div>
<div id="quiz-feedback" class="feedback hidden">
<p id="feedback-result"></p><p id="feedback-explanation"></p><p id="feedback-lecture" class="feedback-lecture"></p>
<button class="btn-primary" onclick="nextQuestion()">次の問題へ</button>
</div></div>
</section>
<section id="result-screen" class="screen">
<div class="card result-card">
<h1>テスト結果</h1>
<div class="score-display"><span id="result-score" class="big-score">0</span><span class="score-divider">/</span><span id="result-total" class="big-score">10</span></div>
<p id="result-percent" class="result-percent"></p>
<p id="result-message" class="result-message"></p>
<p id="submit-status"></p>
<div id="result-details" class="result-details"></div>
<button class="btn-primary" onclick="resetQuiz()">もう一度テストする</button>
</div>
</section>
</div>

let questions=[],currentIndex=0,score=0,answers=[],userName='',selectedDifficulty='';
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function getLectures(){const m={};QUESTION_BANK.forEach(q=>{if(!m[q.lecture])m[q.lecture]={id:q.lecture,name:q.lecture,basic:0,applied:0,practical:0};m[q.lecture][q.difficulty]++});return Object.values(m)}
function init(){const list=document.getElementById('lecture-list');const lectures=getLectures();const tot={basic:0,applied:0,practical:0};lectures.forEach(l=>{tot.basic+=l.basic;tot.applied+=l.applied;tot.practical+=l.practical});const total=tot.basic+tot.applied+tot.practical;document.getElementById('total-count').textContent='全'+total+'問';document.getElementById('total-breakdown').textContent='基礎 '+tot.basic+'問 / 応用 '+tot.applied+'問 / 実践 '+tot.practical+'問';list.innerHTML=lectures.map(l=>{const t=l.basic+l.applied+l.practical;return `<label class="lecture-item"><input type="checkbox" value="${l.id}" checked><span class="lecture-name">${l.name}</span><span class="lecture-stats">計${t}問 <small>(基${l.basic}/応${l.applied}/実${l.practical})</small></span></label>`}).join('')}
function selectAll(){document.querySelectorAll('#lecture-list input').forEach(cb=>cb.checked=true)}
function deselectAll(){document.querySelectorAll('#lecture-list input').forEach(cb=>cb.checked=false)}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(){
userName=document.getElementById('user-name').value.trim();
if(!userName){alert('名前を入力してください');document.getElementById('user-name').focus();return}
const selected=[...document.querySelectorAll('#lecture-list input:checked')].map(cb=>cb.value);
if(!selected.length){alert('講義を1つ以上選択してください');return}
selectedDifficulty=document.querySelector('input[name="difficulty"]:checked').value;
const num=parseInt(document.querySelector('input[name="num"]:checked').value);
let pool=QUESTION_BANK.filter(q=>selected.includes(q.lecture)&&q.difficulty===selectedDifficulty);
if(!pool.length)pool=QUESTION_BANK.filter(q=>selected.includes(q.lecture));
shuffle(pool);questions=pool.slice(0,num);
questions.forEach((q,i)=>{const ans=q.choices[q.answer];q.choices=shuffle([...q.choices]);q.answer=q.choices.indexOf(ans);q.id=i});
currentIndex=0;score=0;answers=[];
const dl={basic:'基礎',applied:'応用',practical:'実践'};
document.getElementById('quiz-difficulty-label').textContent='難易度: '+dl[selectedDifficulty];
showScreen('quiz-screen');renderQuestion()}
function renderQuestion(){const q=questions[currentIndex];document.getElementById('quiz-progress').textContent=`${currentIndex+1} / ${questions.length}`;document.getElementById('quiz-score').textContent=`正解: ${score}`;document.getElementById('quiz-question').textContent=q.question;document.getElementById('quiz-feedback').classList.add('hidden');document.getElementById('quiz-choices').innerHTML=q.choices.map((c,i)=>`<button class="choice-btn" onclick="submitAnswer(${i})">${c}</button>`).join('')}
function submitAnswer(sel){const q=questions[currentIndex];const cor=q.answer;const ok=sel===cor;if(ok)score++;document.querySelectorAll('.choice-btn').forEach((b,i)=>{b.disabled=true;if(i===cor)b.classList.add('correct');if(i===sel&&!ok)b.classList.add('wrong')});const fb=document.getElementById('quiz-feedback');fb.classList.remove('hidden');const r=document.getElementById('feedback-result');r.textContent=ok?'⭕ 正解！':'❌ 不正解';r.className=ok?'correct':'wrong';document.getElementById('feedback-explanation').textContent=q.explanation||'';document.getElementById('feedback-lecture').textContent=q.lecture?'出典: '+q.lecture:'';document.getElementById('quiz-score').textContent='正解: '+score;answers.push({question:q.question,selected:sel,correct:cor,isCorrect:ok,explanation:q.explanation,lecture:q.lecture});if(currentIndex===questions.length-1)fb.querySelector('.btn-primary').textContent='結果を見る'}
function nextQuestion(){currentIndex++;if(currentIndex>=questions.length){showResult();return}renderQuestion()}
function showResult(){showScreen('result-screen');document.getElementById('result-score').textContent=score;document.getElementById('result-total').textContent=questions.length;const p=Math.round(score/questions.length*100);document.getElementById('result-percent').textContent='正答率 '+p+'%';let m='';if(p===100)m='完璧！全問正解です！';else if(p>=80)m='素晴らしい！よく理解できています。';else if(p>=60)m='まずまずです。復習するとさらに良くなります。';else if(p>=40)m='もう少し！講義を見返してみましょう。';else m='講義の復習をおすすめします。';document.getElementById('result-message').textContent=m;document.getElementById('result-details').innerHTML=answers.map(a=>`<div class="result-item"><span class="result-icon">${a.isCorrect?'⭕':'❌'}</span><span class="result-q">${a.question}</span></div>`).join('');sendResult(p)}
function sendResult(pct){const dl={basic:'基礎',applied:'応用',practical:'実践'};const wrong=answers.filter(a=>!a.isCorrect).map(a=>a.question).join(' / ');const payload={name:userName,difficulty:dl[selectedDifficulty]||selectedDifficulty,score:score,total:questions.length,percent:pct,wrong:wrong||'なし'};const st=document.getElementById('submit-status');st.innerHTML='<span style="color:#94a3b8">結果を送信中...</span>';fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(()=>{st.innerHTML='<span class="submitted-badge">結果を送信しました</span>'}).catch(()=>{st.innerHTML='<span style="color:#ef4444">送信に失敗しました</span>'})}
