<div id="app">
<section id="setup-screen" class="screen active">
<h1>講義理解度チェッカー</h1>
<p class="subtitle">講義の内容を理解できているかテストしよう</p>
<div class="card"><h2>1. 講義を選択</h2>
<div class="lecture-controls"><button onclick="selectAll()" class="btn-sm">全選択</button><button onclick="deselectAll()" class="btn-sm">全解除</button></div>
<div id="lecture-list" class="lecture-list"></div></div>
<div class="card"><h2>2. 難易度を選択</h2>
<div class="difficulty-options">

<label class="difficulty-option"><input type="radio" name="difficulty" value="applied"><span class="difficulty-label"><strong>応用</strong><small>仕組み・関係性の理解</small></span></label>
<label class="difficulty-option"><input type="radio" name="difficulty" value="practical"><span class="difficulty-label"><strong>実践</strong><small>判断力・状況対応</small></span></label>
</div></div>
<div class="card"><h2>3. 出題数</h2>
<div class="num-options">
<label><input type="radio" name="num" value="5"> 5問</label>
<label><input type="radio" name="num" value="10" checked> 10問</label>
<label><input type="radio" name="num" value="20"> 20問</label>
</div></div>
<button class="btn-primary" onclick="startQuiz()">テスト開始</button>
</section>

    "explanation": "メディアIDにはどういう層に配信したらCVが取りやすいかの学習が蓄積される。変えると1から崩れる。",
    "lecture": "運用講義・プレイヤー講義"
  }
]
;
let questions=[], currentIndex=0, score=0, answers=[];
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function getLectures(){const m={};QUESTION_BANK.forEach(q=>{if(!m[q.lecture])m[q.lecture]={id:q.lecture,name:q.lecture,basic:0,applied:0,practical:0};m[q.lecture][q.difficulty]++});return Object.values(m)}
function init(){const list=document.getElementById('lecture-list');const lectures=getLectures();list.innerHTML=lectures.map(l=>`<label class="lecture-item"><input type="checkbox" value="${l.id}" checked><span>${l.name} (${l.basic+l.applied+l.practical}問)</span></label>`).join('')}
function selectAll(){document.querySelectorAll('#lecture-list input').forEach(cb=>cb.checked=true)}
function deselectAll(){document.querySelectorAll('#lecture-list input').forEach(cb=>cb.checked=false)}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(){
const selected=[...document.querySelectorAll('#lecture-list input:checked')].map(cb=>cb.value);
if(!selected.length){alert('講義を1つ以上選択してください');return}
const diff=document.querySelector('input[name="difficulty"]:checked').value;
const num=parseInt(document.querySelector('input[name="num"]:checked').value);
let pool=QUESTION_BANK.filter(q=>selected.includes(q.lecture)&&q.difficulty===diff);
if(!pool.length)pool=QUESTION_BANK.filter(q=>selected.includes(q.lecture));
shuffle(pool);questions=pool.slice(0,num);
questions.forEach((q,i)=>{const ans=q.choices[q.answer];q.choices=shuffle([...q.choices]);q.answer=q.choices.indexOf(ans);q.id=i});
currentIndex=0;score=0;answers=[];
const dl={basic:'基礎',applied:'応用',practical:'実践'};
document.getElementById('quiz-difficulty-label').textContent='難易度: '+dl[diff];
showScreen('quiz-screen');renderQuestion()}
function renderQuestion(){const q=questions[currentIndex];document.getElementById('quiz-progress').textContent=`${currentIndex+1} / ${questions.length}`;document.getElementById('quiz-score').textContent=`正解: ${score}`;document.getElementById('quiz-question').textContent=q.question;document.getElementById('quiz-feedback').classList.add('hidden');document.getElementById('quiz-choices').innerHTML=q.choices.map((c,i)=>`<button class="choice-btn" onclick="submitAnswer(${i})">${c}</button>`).join('')}
function submitAnswer(sel){const q=questions[currentIndex];const cor=q.answer;const ok=sel===cor;if(ok)score++;document.querySelectorAll('.choice-btn').forEach((b,i)=>{b.disabled=true;if(i===cor)b.classList.add('correct');if(i===sel&&!ok)b.classList.add('wrong')});const fb=document.getElementById('quiz-feedback');fb.classList.remove('hidden');const r=document.getElementById('feedback-result');r.textContent=ok?'⭕ 正解！':'❌ 不正解';r.className=ok?'correct':'wrong';document.getElementById('feedback-explanation').textContent=q.explanation||'';document.getElementById('feedback-lecture').textContent=q.lecture?'出典: '+q.lecture:'';document.getElementById('quiz-score').textContent='正解: '+score;answers.push({question:q.question,selected:sel,correct:cor,isCorrect:ok,explanation:q.explanation,lecture:q.lecture});if(currentIndex===questions.length-1)fb.querySelector('.btn-primary').textContent='結果を見る'}
function nextQuestion(){currentIndex++;if(currentIndex>=questions.length){showResult();return}renderQuestion()}
function showResult(){showScreen('result-screen');document.getElementById('result-score').textContent=score;document.getElementById('result-total').textContent=questions.length;const p=Math.round(score/questions.length*100);document.getElementById('result-percent').textContent='正答率 '+p+'%';let m='';if(p===100)m='完璧！全問正解です！';else if(p>=80)m='素晴らしい！よく理解できています。';else if(p>=60)m='まずまずです。復習するとさらに良くなります。';else if(p>=40)m='もう少し！講義を見返してみましょう。';else m='講義の復習をおすすめします。';document.getElementById('result-message').textContent=m;document.getElementById('result-details').innerHTML=answers.map(a=>`<div class="result-item"><span class="result-icon">${a.isCorrect?'⭕':'❌'}</span><span class="result-q">${a.question}</span></div>`).join('')}
function resetQuiz(){showScreen('setup-screen')}
init();
</script>
</body>
</html>
